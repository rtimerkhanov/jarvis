<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 300px; padding: 16px; font-family: system-ui; background: #1a1a2e; color: #eee; }
  h2 { font-size: 14px; margin-bottom: 12px; color: #a8b2d1; }
  .field { margin-bottom: 10px; }
  label { display: block; font-size: 11px; color: #8892b0; margin-bottom: 4px; }
  input, select { width: 100%; padding: 6px 8px; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #eee; font-size: 12px; }
  .status { padding: 8px; border-radius: 4px; font-size: 12px; margin-top: 12px; }
  .status.ok { background: #1a3a2a; color: #3fb950; }
  .status.off { background: #3a1a1a; color: #f85149; }
  button { width: 100%; padding: 8px; background: #238636; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 12px; margin-top: 8px; }
  button:hover { background: #2ea043; }
  .toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .toggle input { width: auto; }
</style>
</head>
<body>
  <h2>Jarvis History Tracker</h2>

  <div class="toggle">
    <input type="checkbox" id="enabled" checked>
    <label for="enabled" style="margin:0">Tracking enabled</label>
  </div>

  <div class="field">
    <label>Supabase URL</label>
    <input id="url" placeholder="https://xxx.supabase.co">
  </div>

  <div class="field">
    <label>Supabase Anon Key</label>
    <input id="key" type="password" placeholder="eyJ...">
  </div>

  <div class="field">
    <label>Profile</label>
    <select id="profile">
      <option value="personal">Personal</option>
      <option value="work">Work</option>
    </select>
  </div>

  <button id="save">Save</button>
  <div class="status" id="status"></div>

<script src="popup.js"></script>
</body>
</html>
